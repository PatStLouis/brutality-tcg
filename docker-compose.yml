services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      BOT_API_SECRET: ${BOT_API_SECRET:?set BOT_API_SECRET in .env}
      DEMO: ${DEMO:-false}
    volumes:
      - brutality-data:/app/data
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:?set DISCORD_BOT_TOKEN in .env}
      WEB_API_URL: http://web:3000
      BOT_API_SECRET: ${BOT_API_SECRET:?set BOT_API_SECRET in .env}
      ELIGIBLE_ROLE_IDS: ${ELIGIBLE_ROLE_IDS:-}
      REDEEM_CHANNEL_IDS: ${REDEEM_CHANNEL_IDS:-}
    depends_on:
      - web
    restart: unless-stopped

volumes:
  brutality-data:
